x-memo-stack-server-common: &memo-stack-server-common
  image: python:3.12-slim
  working_dir: /app
  volumes:
    - ./:/app
    - memo_stack_assets:/var/lib/memo-stack/assets
  depends_on:
    memo_stack_postgres:
      condition: service_healthy

x-memo-stack-server-base-env: &memo-stack-server-base-env
  MEMORY_DEPLOY_PROFILE: local
  MEMORY_DATABASE_URL: postgresql+asyncpg://memo_stack:memo_stack@memo_stack_postgres:5432/memo_stack
  MEMORY_AUTO_CREATE_SCHEMA: "true"
  MEMORY_HOST: 0.0.0.0
  MEMORY_PORT: "7788"
  MEMORY_SERVICE_TOKEN: ${MEMORY_SERVICE_TOKEN:-local-dev-token}
  MEMORY_POLICY_MODE: ${MEMORY_POLICY_MODE:-active_context}
  MEMORY_LEGACY_CLIENT_ENABLED: ${MEMORY_LEGACY_CLIENT_ENABLED:-false}
  MEMORY_DEFAULT_SPACE_SLUG: ${MEMORY_DEFAULT_SPACE_SLUG:-default}
  MEMORY_DEFAULT_MEMORY_SCOPE_EXTERNAL_REF: ${MEMORY_DEFAULT_MEMORY_SCOPE_EXTERNAL_REF:-default}
  MEMORY_ASSET_STORAGE_DIR: /var/lib/memo-stack/assets
  MEMORY_EXTRACTION_EXECUTION_LEASE_SECONDS: ${MEMORY_EXTRACTION_EXECUTION_LEASE_SECONDS:-900}
  MEMORY_EXTRACTION_PARSER_TIMEOUT_SECONDS: ${MEMORY_EXTRACTION_PARSER_TIMEOUT_SECONDS:-300}
  MEMORY_EXTRACTION_SUBPROCESS_TIMEOUT_SECONDS: ${MEMORY_EXTRACTION_SUBPROCESS_TIMEOUT_SECONDS:-60}
  MEMORY_EXTRACTION_MAX_IMAGE_PIXELS: ${MEMORY_EXTRACTION_MAX_IMAGE_PIXELS:-50000000}
  MEMORY_PROVIDER_CIRCUIT_FAILURE_THRESHOLD: "3"
  MEMORY_PROVIDER_CIRCUIT_RESET_AFTER_SECONDS: "60"
  MEMORY_COGNEE_ENABLED: ${MEMORY_COGNEE_ENABLED:-false}
  MEMORY_COGNEE_RUNTIME_CONFIGURED: ${MEMORY_COGNEE_RUNTIME_CONFIGURED:-false}
  MEMORY_COGNEE_DATASET_PREFIX: ${MEMORY_COGNEE_DATASET_PREFIX:-memo_stack}

x-memo-stack-server-healthcheck: &memo-stack-server-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/v1/health', timeout=2)",
    ]
  interval: 5s
  timeout: 3s
  retries: 30
  start_period: 20s

services:
  memo_stack_postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: memo_stack
      POSTGRES_PASSWORD: memo_stack
      POSTGRES_DB: memo_stack
    ports:
      - "${MEMORY_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memo_stack -d memo_stack"]
      interval: 5s
      timeout: 3s
      retries: 20

  memo_stack_qdrant:
    image: qdrant/qdrant:v1.18.0
    profiles: ["full"]
    ports:
      - "${MEMORY_QDRANT_PORT:-6333}:6333"
    volumes:
      - memo_stack_qdrant_data:/qdrant/storage

  memo_stack_neo4j:
    image: neo4j:5.26-community
    profiles: ["full"]
    environment:
      NEO4J_AUTH: neo4j/memostackgraph
    ports:
      - "${MEMORY_NEO4J_HTTP_PORT:-7474}:7474"
      - "${MEMORY_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - memo_stack_neo4j_data:/data

  memo_stack_server:
    <<: *memo-stack-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev]' && python -m memo_stack_server.db upgrade && python -m memo_stack_server.admin seed-defaults && python -m memo_stack_server.main"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: memo_stack_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    healthcheck: *memo-stack-server-healthcheck

  memo_stack_worker:
    <<: *memo-stack-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev]' && python -m memo_stack_server.worker --loop --role projection --sleep-seconds 2"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: memo_stack_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    depends_on:
      memo_stack_server:
        condition: service_healthy

  memo_stack_extraction_worker:
    <<: *memo-stack-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev]' && python -m memo_stack_server.worker --loop --role extraction --limit 2 --sleep-seconds 2"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: memo_stack_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    depends_on:
      memo_stack_server:
        condition: service_healthy

  memo_stack_server_full:
    <<: *memo-stack-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti]' && python -m memo_stack_server.db upgrade && python -m memo_stack_server.admin seed-defaults && python -m memo_stack_server.main"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-memo_stack_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    depends_on:
      memo_stack_postgres:
        condition: service_healthy
      memo_stack_qdrant:
        condition: service_started
      memo_stack_neo4j:
        condition: service_started
    healthcheck: *memo-stack-server-healthcheck

  memo_stack_worker_full:
    <<: *memo-stack-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti]' && python -m memo_stack_server.worker --loop --role projection --sleep-seconds 2"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-memo_stack_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    depends_on:
      memo_stack_server_full:
        condition: service_healthy

  memo_stack_extraction_worker_full:
    <<: *memo-stack-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti]' && python -m memo_stack_server.worker --loop --role extraction --limit 2 --sleep-seconds 2"
    environment:
      <<: *memo-stack-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://memo_stack_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-memo_stack_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memo_stack_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memostackgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    depends_on:
      memo_stack_server_full:
        condition: service_healthy

volumes:
  memo_stack_assets:
  memo_stack_qdrant_data:
  memo_stack_neo4j_data:
