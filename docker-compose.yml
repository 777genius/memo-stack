x-infinity-context-server-common: &infinity-context-server-common
  build:
    context: .
    args:
      INFINITY_CONTEXT_EXTRAS: dev,qdrant,openai,graphiti,mcp,docling
      INFINITY_CONTEXT_PREINSTALL_TORCH_CPU: ${INFINITY_CONTEXT_PREINSTALL_TORCH_CPU:-true}
      INFINITY_CONTEXT_TORCH_INDEX_URL: ${INFINITY_CONTEXT_TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
  image: infinity-context:local
  working_dir: /app
  volumes:
    - ./:/app
    - infinity_context_assets:/var/lib/infinity-context/assets
  depends_on:
    infinity_context_postgres:
      condition: service_healthy

x-infinity-context-server-base-env: &infinity-context-server-base-env
  MEMORY_DEPLOY_PROFILE: local
  PYTHONPATH: /app/packages/infinity_context_core:/app/packages/infinity_context_server:/app/packages/infinity_context_adapters:/app/packages/infinity_context_sdk:/app/packages/infinity_context_mcp:/app/packages/infinity_context_cli:/app/packages/infinity_context_obsidian
  MEMORY_DATABASE_URL: postgresql+asyncpg://infinity_context:infinity_context@infinity_context_postgres:5432/infinity_context
  MEMORY_AUTO_CREATE_SCHEMA: "true"
  MEMORY_HOST: 0.0.0.0
  MEMORY_PORT: "7788"
  MEMORY_SERVICE_TOKEN: ${MEMORY_SERVICE_TOKEN:-local-dev-token}
  MEMORY_POLICY_MODE: ${MEMORY_POLICY_MODE:-active_context}
  MEMORY_CAPTURE_MODE: ${MEMORY_CAPTURE_MODE:-suggest}
  MEMORY_LEGACY_CLIENT_ENABLED: ${MEMORY_LEGACY_CLIENT_ENABLED:-false}
  MEMORY_DEFAULT_SPACE_SLUG: ${MEMORY_DEFAULT_SPACE_SLUG:-default}
  MEMORY_DEFAULT_MEMORY_SCOPE_EXTERNAL_REF: ${MEMORY_DEFAULT_MEMORY_SCOPE_EXTERNAL_REF:-default}
  MEMORY_ASSET_STORAGE_DIR: /var/lib/infinity-context/assets
  MEMORY_EXTRACTION_EXECUTION_LEASE_SECONDS: ${MEMORY_EXTRACTION_EXECUTION_LEASE_SECONDS:-900}
  MEMORY_EXTRACTION_CANCELLATION_POLL_SECONDS: ${MEMORY_EXTRACTION_CANCELLATION_POLL_SECONDS:-1}
  MEMORY_EXTRACTION_HEARTBEAT_SECONDS: ${MEMORY_EXTRACTION_HEARTBEAT_SECONDS:-15}
  MEMORY_EXTRACTION_PARSER_TIMEOUT_SECONDS: ${MEMORY_EXTRACTION_PARSER_TIMEOUT_SECONDS:-300}
  MEMORY_EXTRACTION_SUBPROCESS_TIMEOUT_SECONDS: ${MEMORY_EXTRACTION_SUBPROCESS_TIMEOUT_SECONDS:-60}
  MEMORY_EXTRACTION_MAX_IMAGE_PIXELS: ${MEMORY_EXTRACTION_MAX_IMAGE_PIXELS:-50000000}
  MEMORY_TRANSCRIPTION_PROVIDER: ${MEMORY_TRANSCRIPTION_PROVIDER:-disabled}
  MEMORY_TRANSCRIPTION_OPENAI_MODEL: ${MEMORY_TRANSCRIPTION_OPENAI_MODEL:-gpt-4o-mini-transcribe}
  MEMORY_PROVIDER_CIRCUIT_FAILURE_THRESHOLD: "3"
  MEMORY_PROVIDER_CIRCUIT_RESET_AFTER_SECONDS: "60"
  MEMORY_COGNEE_ENABLED: ${MEMORY_COGNEE_ENABLED:-false}
  MEMORY_COGNEE_RUNTIME_CONFIGURED: ${MEMORY_COGNEE_RUNTIME_CONFIGURED:-false}
  MEMORY_COGNEE_DATASET_PREFIX: ${MEMORY_COGNEE_DATASET_PREFIX:-infinity_context}

x-infinity-context-server-healthcheck: &infinity-context-server-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/v1/health', timeout=2)",
    ]
  interval: 5s
  timeout: 3s
  retries: 30
  start_period: 20s

services:
  infinity_context_postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: infinity_context
      POSTGRES_PASSWORD: infinity_context
      POSTGRES_DB: infinity_context
    ports:
      - "${MEMORY_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinity_context -d infinity_context"]
      interval: 5s
      timeout: 3s
      retries: 20

  infinity_context_qdrant:
    image: qdrant/qdrant:v1.18.0
    profiles: ["full"]
    ports:
      - "${MEMORY_QDRANT_PORT:-6333}:6333"
    volumes:
      - infinity_context_qdrant_data:/qdrant/storage

  infinity_context_neo4j:
    image: neo4j:5.26-community
    profiles: ["full"]
    environment:
      NEO4J_AUTH: neo4j/infinitycontextgraph
    ports:
      - "${MEMORY_NEO4J_HTTP_PORT:-7474}:7474"
      - "${MEMORY_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - infinity_context_neo4j_data:/data

  infinity_context_server:
    <<: *infinity-context-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev,docling]' && python -m infinity_context_server.db upgrade && python -m infinity_context_server.admin seed-defaults && python -m infinity_context_server.main"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: infinity_context_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    healthcheck: *infinity-context-server-healthcheck

  infinity_context_worker:
    <<: *infinity-context-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev,docling]' && python -m infinity_context_server.worker --loop --role projection --sleep-seconds 2"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: infinity_context_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    depends_on:
      infinity_context_server:
        condition: service_healthy

  infinity_context_extraction_worker:
    <<: *infinity-context-server-common
    profiles: ["lite"]
    command: sh -c "pip install -e '.[dev,docling]' && python -m infinity_context_server.worker --loop --role extraction --limit 2 --concurrency ${MEMORY_EXTRACTION_WORKER_CONCURRENCY:-1} --sleep-seconds 2"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: infinity_context_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    depends_on:
      infinity_context_server:
        condition: service_healthy

  infinity_context_server_full:
    <<: *infinity-context-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti,docling]' && python -m infinity_context_server.db upgrade && python -m infinity_context_server.admin seed-defaults && python -m infinity_context_server.main"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-infinity_context_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_TRANSCRIPTION_PROVIDER: ${MEMORY_TRANSCRIPTION_PROVIDER:-openai}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    depends_on:
      infinity_context_postgres:
        condition: service_healthy
      infinity_context_qdrant:
        condition: service_started
      infinity_context_neo4j:
        condition: service_started
    healthcheck: *infinity-context-server-healthcheck

  infinity_context_worker_full:
    <<: *infinity-context-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti,docling]' && python -m infinity_context_server.worker --loop --role projection --sleep-seconds 2"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-infinity_context_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_TRANSCRIPTION_PROVIDER: ${MEMORY_TRANSCRIPTION_PROVIDER:-openai}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    depends_on:
      infinity_context_server_full:
        condition: service_healthy

  infinity_context_extraction_worker_full:
    <<: *infinity-context-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti,docling]' && python -m infinity_context_server.worker --loop --role extraction --limit 2 --concurrency ${MEMORY_EXTRACTION_WORKER_CONCURRENCY:-1} --sleep-seconds 2"
    environment:
      <<: *infinity-context-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://infinity_context_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-infinity_context_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_TRANSCRIPTION_PROVIDER: ${MEMORY_TRANSCRIPTION_PROVIDER:-openai}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://infinity_context_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: infinitycontextgraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    depends_on:
      infinity_context_server_full:
        condition: service_healthy

volumes:
  infinity_context_assets:
  infinity_context_qdrant_data:
  infinity_context_neo4j_data:
