x-memory-server-common: &memory-server-common
  image: python:3.12-slim
  working_dir: /app
  volumes:
    - ./:/app
  depends_on:
    memory_postgres:
      condition: service_healthy

x-memory-server-base-env: &memory-server-base-env
  MEMORY_DEPLOY_PROFILE: local
  MEMORY_DATABASE_URL: postgresql+asyncpg://memory:memory@memory_postgres:5432/memory
  MEMORY_AUTO_CREATE_SCHEMA: "true"
  MEMORY_HOST: 0.0.0.0
  MEMORY_PORT: "7788"
  MEMORY_SERVICE_TOKEN: ${MEMORY_SERVICE_TOKEN:-local-dev-token}
  MEMORY_POLICY_MODE: ${MEMORY_POLICY_MODE:-active_context}
  MEMORY_LEGACY_HACKINTERVIEW_ENABLED: "true"
  MEMORY_DEFAULT_SPACE_SLUG: ${MEMORY_DEFAULT_SPACE_SLUG:-hackinterview}
  MEMORY_DEFAULT_PROFILE_EXTERNAL_REF: ${MEMORY_DEFAULT_PROFILE_EXTERNAL_REF:-default}
  MEMORY_PROVIDER_CIRCUIT_FAILURE_THRESHOLD: "3"
  MEMORY_PROVIDER_CIRCUIT_RESET_AFTER_SECONDS: "60"
  MEMORY_COGNEE_ENABLED: ${MEMORY_COGNEE_ENABLED:-false}
  MEMORY_COGNEE_RUNTIME_CONFIGURED: ${MEMORY_COGNEE_RUNTIME_CONFIGURED:-false}
  MEMORY_COGNEE_DATASET_PREFIX: ${MEMORY_COGNEE_DATASET_PREFIX:-memory}

x-memory-server-healthcheck: &memory-server-healthcheck
  test:
    [
      "CMD",
      "python",
      "-c",
      "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/v1/health', timeout=2)",
    ]
  interval: 5s
  timeout: 3s
  retries: 30
  start_period: 20s

services:
  memory_postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: memory
      POSTGRES_PASSWORD: memory
      POSTGRES_DB: memory
    ports:
      - "${MEMORY_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory -d memory"]
      interval: 5s
      timeout: 3s
      retries: 20

  memory_qdrant:
    image: qdrant/qdrant:v1.18.0
    profiles: ["full"]
    ports:
      - "${MEMORY_QDRANT_PORT:-6333}:6333"
    volumes:
      - memory_qdrant_data:/qdrant/storage

  memory_neo4j:
    image: neo4j:5.26-community
    profiles: ["full"]
    environment:
      NEO4J_AUTH: neo4j/memorygraph
    ports:
      - "${MEMORY_NEO4J_HTTP_PORT:-7474}:7474"
      - "${MEMORY_NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - memory_neo4j_data:/data

  memory_server:
    <<: *memory-server-common
    profiles: ["lite", "hackinterview"]
    command: sh -c "pip install -e '.[dev]' && python -m memory_server.db upgrade && python -m memory_server.admin seed-defaults && python -m memory_server.main"
    environment:
      <<: *memory-server-base-env
      MEMORY_QDRANT_ENABLED: "false"
      MEMORY_QDRANT_URL: http://memory_qdrant:6333
      MEMORY_QDRANT_COLLECTION: memory_chunks_v1
      MEMORY_EMBEDDINGS_ENABLED: "false"
      MEMORY_EMBEDDINGS_PROVIDER: noop
      MEMORY_GRAPHITI_ENABLED: "false"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memory_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memorygraph
      MEMORY_GRAPHITI_BUILD_INDICES: "false"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    healthcheck: *memory-server-healthcheck

  memory_server_full:
    <<: *memory-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti]' && python -m memory_server.db upgrade && python -m memory_server.admin seed-defaults && python -m memory_server.main"
    environment:
      <<: *memory-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://memory_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-memory_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memory_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memorygraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    ports:
      - "${MEMORY_SERVER_PORT:-7788}:7788"
    depends_on:
      memory_postgres:
        condition: service_healthy
      memory_qdrant:
        condition: service_started
      memory_neo4j:
        condition: service_started
    healthcheck: *memory-server-healthcheck

  memory_worker_full:
    <<: *memory-server-common
    profiles: ["full"]
    command: sh -c "pip install -e '.[dev,qdrant,openai,graphiti]' && python -m memory_server.worker --loop --sleep-seconds 2"
    environment:
      <<: *memory-server-base-env
      MEMORY_QDRANT_ENABLED: "true"
      MEMORY_QDRANT_URL: http://memory_qdrant:6333
      MEMORY_QDRANT_COLLECTION: ${MEMORY_QDRANT_COLLECTION:-memory_chunks_v1}
      MEMORY_EMBEDDINGS_ENABLED: "true"
      MEMORY_EMBEDDINGS_PROVIDER: openai
      MEMORY_EMBEDDINGS_MODEL: ${MEMORY_EMBEDDINGS_MODEL:-text-embedding-3-small}
      MEMORY_EMBEDDINGS_DIMENSIONS: ${MEMORY_EMBEDDINGS_DIMENSIONS:-1536}
      MEMORY_OPENAI_API_KEY: ${MEMORY_OPENAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MEMORY_GRAPHITI_ENABLED: "true"
      MEMORY_GRAPHITI_NEO4J_URI: bolt://memory_neo4j:7687
      MEMORY_GRAPHITI_NEO4J_USER: neo4j
      MEMORY_GRAPHITI_NEO4J_PASSWORD: memorygraph
      MEMORY_GRAPHITI_BUILD_INDICES: "true"
    depends_on:
      memory_server_full:
        condition: service_healthy

volumes:
  memory_qdrant_data:
  memory_neo4j_data:
