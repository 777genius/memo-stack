[project]
name = "memory-adapters"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
  "alembic>=1.18.4,<2.0.0",
  "asyncpg>=0.31.0,<1.0.0",
  "greenlet>=3.5.1,<4.0.0",
  "sqlalchemy>=2.0.50,<3.0.0",
]

[project.optional-dependencies]
qdrant = [
  "qdrant-client>=1.18.0,<2.0.0",
]
openai = [
  "openai>=2.38.0,<3.0.0",
]
graphiti = [
  "graphiti-core>=0.29.1,<1.0.0",
]

[tool.setuptools.package-data]
memory_adapters = [
  "extraction/prompts/*.md",
  "extraction/schemas/*.json",
]
